title: OrderBuddy node test.js Execution from .vscode
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: stable
level: critical
description: |
    Detects execution of test.js from the .vscode directory — the main
    credential stealer payload of the OrderBuddy campaign.
author: Leviticus-Triage
date: 2026-02-28
tags:
    - attack.execution
    - attack.t1059.007
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        CommandLine|contains|all:
            - 'node'
            - '.vscode'
            - 'test.js'
    condition: selection
falsepositives:
    - Very unlikely in production environments
