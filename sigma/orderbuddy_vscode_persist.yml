title: OrderBuddy VS Code Auto-Task Execution
id: d4e5f6a7-b8c9-0123-def0-234567890123
status: stable
level: high
description: |
    Detects VS Code/Cursor spawning shell processes immediately after
    folder open, which indicates tasks.json auto-execution abuse.
author: Leviticus-Triage
date: 2026-02-28
tags:
    - attack.execution
    - attack.t1204.002
logsource:
    category: process_creation
    product: windows
detection:
    selection_parent:
        ParentImage|endswith:
            - '\code.exe'
            - '\cursor.exe'
    selection_child:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\bash.exe'
    selection_suspicious:
        CommandLine|contains:
            - 'curl'
            - 'wget'
            - 'short.gy'
            - 'vercel.app'
    condition: selection_parent and selection_child and selection_suspicious
falsepositives:
    - Legitimate VS Code tasks that call curl/wget (review individually)
