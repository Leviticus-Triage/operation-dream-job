title: OrderBuddy .vscode Persistence — npm Install in User Config
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: stable
level: high
description: |
    Detects npm install execution within the user's .vscode directory,
    which is the persistence mechanism used by the OrderBuddy campaign.
    Legitimate VS Code extensions do not use npm install in ~/.vscode/.
references:
    - https://github.com/Leviticus-Triage/operation-dream-job
author: Leviticus-Triage
date: 2026-02-28
tags:
    - attack.persistence
    - attack.t1053.005
    - attack.defense_evasion
    - attack.t1036
logsource:
    category: process_creation
    product: linux
detection:
    selection_npm:
        CommandLine|contains:
            - 'npm install'
            - 'npm i '
    selection_vscode_dir:
        CommandLine|contains: '.vscode'
    condition: selection_npm and selection_vscode_dir
falsepositives:
    - Manual npm install by developer in .vscode extension development (rare)
