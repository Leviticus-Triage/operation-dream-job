title: setInterval-Based Persistence with Network Activity
id: f6a7b8c9-d0e1-2345-f012-456789012345
status: stable
level: medium
description: |
    Detects Node.js processes with periodic network connections,
    indicating timer-based C2 beacon (setInterval pattern).
author: Leviticus-Triage
date: 2026-02-28
tags:
    - attack.persistence
    - attack.t1053.005
    - attack.command_and_control
    - attack.t1071.001
logsource:
    category: network_connection
    product: linux
detection:
    selection:
        Image|endswith: '/node'
        dst_port:
            - 1244
            - 21
            - 4444
    filter_legitimate:
        dst_ip|startswith:
            - '10.'
            - '172.16.'
            - '192.168.'
            - '127.'
    condition: selection and not filter_legitimate
falsepositives:
    - Node.js applications legitimately connecting to external services on non-standard ports
