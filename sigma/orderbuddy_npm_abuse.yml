title: Suspicious npm Lifecycle Hook Execution
id: e5f6a7b8-c9d0-1234-ef01-345678901234
status: stable
level: medium
description: |
    Detects npm lifecycle hooks (preinstall, postinstall) executing shell commands,
    which is a common technique in supply chain attacks including Operation Dream Job.
references:
    - https://github.com/Leviticus-Triage/operation-dream-job
author: Leviticus-Triage
date: 2026-02-28
tags:
    - attack.execution
    - attack.t1204.002
    - attack.persistence
logsource:
    category: process_creation
    product: linux
detection:
    selection_npm_parent:
        ParentCommandLine|contains: 'npm'
    selection_shell_child:
        CommandLine|contains:
            - 'curl '
            - 'wget '
            - '/bin/sh'
            - '/bin/bash'
            - 'python'
            - 'node -e'
    condition: selection_npm_parent and selection_shell_child
falsepositives:
    - Legitimate build scripts using curl/wget in postinstall hooks
    - Node.js native addon compilation (node-gyp)
