title: OrderBuddy C2 Beacon via DNS
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: stable
level: high
description: Detects DNS resolution of known OrderBuddy campaign domains.
author: Leviticus-Triage
date: 2026-02-28
tags:
    - attack.command_and_control
    - attack.t1071.001
logsource:
    category: dns
detection:
    selection:
        query|contains:
            - 'gurucooldown.short.gy'
            - 'alanservice.vercel.app'
            - 'orderbuddyapp.com'
            - 'orderbuddyshop.com'
            - 'jsonkeeper.com'
    condition: selection
falsepositives:
    - jsonkeeper.com is a legitimate paste service and may produce false positives in isolation
